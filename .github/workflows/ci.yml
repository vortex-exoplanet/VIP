# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: ci

on: [push, pull_request]

concurrency:
  # auto-cancel any in-progress job *on the same branch*
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # drastically reduce overhead from coverage measurement (on Python 3.12+)
  COVERAGE_CORE: sysmon

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Run pre-commit
      run: |
        pip install pre-commit
        pre-commit run --files src/**/*.py

  no_object_checks:
    needs: pre-commit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        group: [1, 2, 3]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --editable . --group dev
    - name: Test with pytest
      run: |
        coverage run --source src -m pytest tests/pre_3_10 --splits 3 --group ${{ matrix.group }}
        coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6

  objects_check:
    needs: pre-commit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --editable . --group dev
    - name: Test with pytest
      run: |
        coverage run --source=src/vip_hci/objects/ -m pytest tests/post_3_10
        coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
